services:
  web_app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - .:/usr/share/nginx/html
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      # Local Router
      - "traefik.http.routers.flutter-prstart-hu-local.rule=Host(`flutter.localhost`)"
      - "traefik.http.routers.flutter-prstart-hu-local.entrypoints=websecure"
      - "traefik.http.routers.flutter-prstart-hu-local.tls=true"
      # Production Router
      - "traefik.http.routers.flutter-prstart-hu-prod.rule=Host(`flutter.prstart.hu`)"
      - "traefik.http.routers.flutter-prstart-hu-prod.entrypoints=websecure"
      - "traefik.http.routers.flutter-prstart-hu-prod.tls=true"
      - "traefik.http.routers.flutter-prstart-hu-prod.tls.certresolver=myresolver"
      # Service binding
      - "traefik.docker.network=traefik"
      - "traefik.http.services.flutter-prstart-hu.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
