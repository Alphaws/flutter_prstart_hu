services:
  web_app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - .:/usr/share/nginx/html
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flutter-prstart-hu.rule=Host(`flutter.localhost`)"
      - "traefik.http.routers.flutter-prstart-hu.entrypoints=websecure"
      - "traefik.http.routers.flutter-prstart-hu.tls=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.services.flutter-prstart-hu.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
